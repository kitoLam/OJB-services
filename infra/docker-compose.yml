# ============================================================
#  INFRA — Shared Infrastructure
#  Services: Redis, MinIO, RabbitMQ
#
#  Usage:
#    cd infra && docker compose up -d
#
#  Other services join via network: infra_network
#    networks:
#      infra_network:
#        external: true
# ============================================================

name: infra

services:

  # ----------------------------------------------------------
  # Redis — Cache, Session, Rate Limiting, Pub/Sub
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: infra_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - infra_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # MinIO — Object Storage (Test Cases, Submissions, Avatars)
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: infra_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # Web Console UI
    volumes:
      - minio_data:/data
    networks:
      - infra_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Init — Tự tạo bucket khi startup lần đầu
  minio-init:
    image: minio/mc:latest
    container_name: infra_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/test-cases;
        mc mb --ignore-existing local/submissions;
        mc mb --ignore-existing local/avatars;
        mc anonymous set download local/avatars;
        echo 'MinIO buckets initialized.';
      "
    networks:
      - infra_network

  # ----------------------------------------------------------
  # RabbitMQ — Message Broker (inter-service communication)
  # ----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: infra_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - infra_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5

# ============================================================
# Volumes
# ============================================================
volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local
  rabbitmq_data:
    driver: local

# ============================================================
# Network — Exposed as external so other services can join
# ============================================================
networks:
  infra_network:
    name: infra_network
    driver: bridge
